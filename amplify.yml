version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - cd web-app/client && pnpm install --frozen-lockfile
    build:
      commands:
        - cd web-app/client && pnpm run build
  artifacts:
    baseDirectory: web-app/client/dist
    files:
      - '**/*'
  cache:
    paths:
      - web-app/client/node_modules/**/*
