# Build the worker Docker image, push to ECR, and deploy all worker infrastructure stacks
# (FormulusEcr, FormulusQueue, FormulusCompute, FormulusDispatcher).
#
# - Push worker-staging: Prettier/ESLint skipped.
# - Push worker-prod: Prettier/ESLint block deploy on failure.
# - Manual "Run workflow": Prettier/ESLint run by default; set `skip_quality_checks` to bypass.

name: Deploy Worker

on:
  push:
    branches: [worker-prod, worker-staging]
  workflow_dispatch:
    inputs:
      skip_quality_checks:
        description: Skip code quality checks
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/worker-prod' && 'production' || 'staging' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      DEPLOY_TARGET: worker
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: ${{ vars.NODE_ENV }}
      ECR_REPO: formulus-worker
      IMAGE_TAG: ${{ github.ref == 'refs/heads/worker-prod' && 'latest' || 'staging' }}
      DATA_BUCKET: ${{ vars.DATA_BUCKET }}
      RUN_QUALITY_CHECKS: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/worker-staging') && !(github.event_name == 'workflow_dispatch' && inputs.skip_quality_checks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: |
            web-app/pnpm-lock.yaml
            web-app/worker/pnpm-lock.yaml
            web-app/shared/pnpm-lock.yaml
            web-app/infra/pnpm-lock.yaml

      # --- Quality checks ---

      - name: Install web-app dependencies (Prettier)
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app
        run: pnpm install --frozen-lockfile

      - name: Prettier
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app
        run: pnpm --filter ./worker prettier:check

      - name: Install /worker dependencies
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/worker
        run: pnpm install --frozen-lockfile

      - name: ESLint
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/worker
        run: pnpm run lint

      - name: Install /shared dependencies
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/shared
        run: pnpm install --frozen-lockfile

      - name: ESLint (shared)
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/shared
        run: pnpm run lint

      - name: Quality checks skipped
        if: env.RUN_QUALITY_CHECKS != 'true'
        run: echo "::warning::Prettier and ESLint were skipped."

      # --- Deploy ECR ---

      - name: Generate Prisma client
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/worker
        run: pnpm run prisma:generate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install infra dependencies
        working-directory: web-app/infra
        run: pnpm install --frozen-lockfile

      - name: Build infra
        working-directory: web-app/infra
        run: pnpm run build

      - name: CDK deploy ECR stack
        working-directory: web-app/infra
        run: |
          pnpm exec cdk deploy FormulusEcr \
            --require-approval never \
            -c workerOnly=true

      # --- Build and push Docker image ---

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build worker image
        run: |
          docker build \
            --build-arg NODE_ENV=${{ env.NODE_ENV }} \
            -f web-app/worker/Dockerfile \
            -t "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}" \
            .

      - name: Push worker image
        run: |
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"

      - name: Build typescript runner image
        run: |
          docker build \
            -f web-app/worker/src/core/backtesting/rpc/dockerfiles/typescript.Dockerfile \
            -t "${{ steps.login-ecr.outputs.registry }}/formulus-runner-typescript:${{ env.IMAGE_TAG }}" \
            web-app/worker/src/core/backtesting/rpc/dockerfiles

      - name: Push typescript runner image
        run: |
          docker push "${{ steps.login-ecr.outputs.registry }}/formulus-runner-typescript:${{ env.IMAGE_TAG }}"

      - name: Build C++ runner image
        run: |
          docker build \
            -f web-app/worker/src/core/backtesting/rpc/dockerfiles/cpp.Dockerfile \
            -t "${{ steps.login-ecr.outputs.registry }}/formulus-runner-cpp:${{ env.IMAGE_TAG }}" \
            web-app/worker/src/core/backtesting/rpc/dockerfiles

      - name: Push C++ runner image
        run: |
          docker push "${{ steps.login-ecr.outputs.registry }}/formulus-runner-cpp:${{ env.IMAGE_TAG }}"

      # --- CDK deploy remaining worker infrastructure ---

      - name: CDK deploy worker stacks
        working-directory: web-app/infra
        run: |
          if [ "${{ github.ref }}" = "refs/heads/worker-prod" ]; then
            COMPUTE_STACK=FormulusCompute
            DISPATCHER_STACK=FormulusDispatcher
          else
            COMPUTE_STACK=FormulusComputeStaging
            DISPATCHER_STACK=FormulusDispatcherStaging
          fi
          pnpm exec cdk deploy "$COMPUTE_STACK" "$DISPATCHER_STACK" \
            --require-approval never \
            -c workerOnly=true
