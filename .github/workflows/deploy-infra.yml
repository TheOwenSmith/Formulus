# Full CDK app (all stacks). Prefer component branches: client-prod, api-prod, worker-prod.
name: Deploy Infra (CDK full stack)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web-app/infra/**'
      - '.github/workflows/deploy-infra.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: cdk-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      GITHUB_ACTIONS: 'true'
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      NODE_ENV: ${{ secrets.NODE_ENV }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      COHERE_MODEL: ${{ secrets.COHERE_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web-app/infra/pnpm-lock.yaml

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Install infra deps
        working-directory: web-app/infra
        run: pnpm install --frozen-lockfile

      - name: Build infra
        working-directory: web-app/infra
        run: pnpm run build

      - name: CDK synth
        working-directory: web-app/infra
        run: npx cdk synth

      - name: CDK deploy
        working-directory: web-app/infra
        env:
          API_DOMAIN_NAME: ${{ vars.API_DOMAIN_NAME }}
          API_SUB_DOMAIN: ${{ vars.API_SUB_DOMAIN }}
        run: |
          set -euo pipefail
          EXTRA=()
          if [ -n "${API_DOMAIN_NAME:-}" ] && [ -n "${API_SUB_DOMAIN:-}" ]; then
            EXTRA+=( -c "apiDomainName=${API_DOMAIN_NAME}" -c "apiSubDomain=${API_SUB_DOMAIN}" )
          fi
          npx cdk deploy --all --require-approval never "${EXTRA[@]}"

