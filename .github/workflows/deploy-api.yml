name: Deploy API

on:
  push:
    branches: [api-prod]

permissions:
  contents: read

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      GITHUB_ACTIONS: "true"

      # API Lambda environment (see LAMBDA_ENV_KEYS in web-app/infra/bin/app.ts)
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      NODE_ENV: ${{ secrets.NODE_ENV }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      COHERE_MODEL: ${{ secrets.COHERE_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: web-app/infra/pnpm-lock.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install infra deps
        working-directory: web-app/infra
        run: pnpm install --frozen-lockfile

      - name: Build infra
        working-directory: web-app/infra
        run: pnpm run build

      - name: CDK deploy API stack
        working-directory: web-app/infra
        env:
          API_DOMAIN_NAME: ${{ vars.API_DOMAIN_NAME }}
          API_SUB_DOMAIN: ${{ vars.API_SUB_DOMAIN }}
        run: |
          set -euo pipefail
          EXTRA=()
          if [ -n "${API_DOMAIN_NAME:-}" ] && [ -n "${API_SUB_DOMAIN:-}" ]; then
            EXTRA+=( -c "apiDomainName=${API_DOMAIN_NAME}" -c "apiSubDomain=${API_SUB_DOMAIN}" )
          fi
          npx cdk deploy FormulusApi --require-approval never "${EXTRA[@]}"
