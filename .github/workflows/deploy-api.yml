# Deploy API Lambda + API Gateway (staging + production).
#
# - Push api-staging: Prettier/ESLint skipped.
# - Push api-prod: Prettier/ESLint block deploy on failure.
# - Manual "Run workflow": Prettier/ESLint run by default; set `skip_quality_checks` to bypass.
name: Deploy API

on:
  push:
    branches: [api-prod, api-staging]
  workflow_dispatch:
    inputs:
      skip_quality_checks:
        description: Skip code quality checks
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/api-prod' && 'production' || 'staging' }}
    env:
      # Opt into Node.js 24 for JS actions until defaults roll forward (see GH changelog).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      DEPLOY_TARGET: api

      # API Lambda environment (see LAMBDA_ENV_KEYS in web-app/infra/bin/app.ts)
      NODE_ENV: ${{ vars.NODE_ENV }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      COHERE_MODEL: ${{ secrets.COHERE_MODEL }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      RUN_QUALITY_CHECKS: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/api-staging') && !(github.event_name == 'workflow_dispatch' && inputs.skip_quality_checks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: |
            web-app/pnpm-lock.yaml
            web-app/api/pnpm-lock.yaml
            web-app/shared/pnpm-lock.yaml
            web-app/infra/pnpm-lock.yaml

      # --- Quality checks ---

      - name: Install /web-app dependencies (Prettier)
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app
        env:
          CI: "true"
        run: pnpm install --frozen-lockfile

      - name: Prettier
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/api
        run: pnpm run prettier:check

      - name: Install /api dependencies
        working-directory: web-app/api
        run: pnpm install --frozen-lockfile

      - name: ESLint
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/api
        run: pnpm run lint

      - name: Install /shared dependencies
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/shared
        run: pnpm install --frozen-lockfile

      - name: ESLint (shared)
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/shared
        run: pnpm run lint

      - name: Quality checks skipped
        if: env.RUN_QUALITY_CHECKS != 'true'
        run: echo "::warning::Prettier and ESLint were skipped."

      # --- Deploy ---

      - name: Generate Prisma client
        if: env.RUN_QUALITY_CHECKS == 'true'
        working-directory: web-app/api
        run: pnpm run prisma:generate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install infra deps
        working-directory: web-app/infra
        run: pnpm install --frozen-lockfile

      - name: Build infra
        working-directory: web-app/infra
        run: pnpm run build

      - name: Run database migrations
        working-directory: web-app/api
        run: pnpm exec prisma migrate deploy

      - name: CDK deploy API stack
        working-directory: web-app/infra
        env:
          API_DOMAIN_NAME: ${{ vars.API_DOMAIN_NAME }}
          API_SUB_DOMAIN: ${{ vars.API_SUB_DOMAIN }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" = "refs/heads/api-prod" ]; then
            QUEUE_STACK=FormulusQueue
            STACK=FormulusApi
            EXTRA=()
            if [ -n "${API_DOMAIN_NAME:-}" ] && [ -n "${API_SUB_DOMAIN:-}" ]; then
              EXTRA+=( -c "apiDomainName=${API_DOMAIN_NAME}" -c "apiSubDomain=${API_SUB_DOMAIN}" )
            fi
          else
            QUEUE_STACK=FormulusQueueStaging
            STACK=FormulusApiStaging
            EXTRA=()
            if [ -n "${API_DOMAIN_NAME:-}" ] && [ -n "${API_SUB_DOMAIN:-}" ]; then
              EXTRA+=( -c "apiStagingDomainName=${API_DOMAIN_NAME}" -c "apiStagingSubDomain=${API_SUB_DOMAIN}" )
            fi
          fi
          npx cdk deploy "$STACK" "$QUEUE_STACK" --require-approval never "${EXTRA[@]}"
